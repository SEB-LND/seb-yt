<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="shortcut icon" href="YouTube.ico" type="image/x-icon" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>React YouTube clone</title>
    <style>
      /* Critical first-paint fallback: prevent header/logo flash before runtime styles load. */
      #root .MuiAppBar-root {
        background-color: #fff;
        color: rgba(0, 0, 0, 0.87);
      }

      #root .MuiAppBar-colorPrimary,
      #root .MuiAppBar-colorDefault {
        background-color: #fff;
        color: rgba(0, 0, 0, 0.87);
      }

      #root .MuiToolbar-regular {
        min-height: 48px;
        height: 48px;
      }

      #root header .MuiToolbar-root {
        padding-left: 12px;
        padding-right: 12px;
      }

      #root [data-header-left],
      #root [class*='LeftContainer__StyledLeftContainer'] {
        color: #030303;
        height: 100%;
        display: flex;
        align-items: center;
        flex-grow: 0;
        flex-wrap: nowrap;
      }

      #root [data-header-middle],
      #root [class*='MiddleContainer__StyledMiddleContainer'] {
        color: #030303;
        height: 100%;
        display: flex;
        align-items: center;
        flex-grow: 1;
        justify-content: flex-end;
      }

      #root [data-header-right],
      #root [class*='RightContainer__StyledRightContainer'] {
        color: #030303;
        height: 100%;
        display: flex;
        align-items: center;
        flex-grow: 0;
        flex-wrap: nowrap;
        justify-content: space-between;
      }

      #root [data-header-home-link] {
        height: 100%;
        display: flex;
        align-items: center;
        text-decoration: none;
      }

      #root [data-header-logo-wrap] {
        border: none;
        background: transparent;
        padding: 0;
        margin: 0;
        height: 100%;
        display: flex;
        align-items: center;
      }

      #root header .MuiIconButton-root {
        padding: 12px;
      }

      #root header .MuiIconButton-root .MuiSvgIcon-root {
        font-size: 1.35rem;
      }

      #root header [data-header-right] .MuiAvatar-root,
      #root header [class*='RightContainer__StyledRightContainer'] .MuiAvatar-root {
        width: 24px;
        height: 24px;
        font-size: 0.875rem;
        color: #fff;
        background-color: #ef6c00;
      }

      @media screen and (min-width: 496px) {
        #root .MuiToolbar-regular {
          min-height: 56px;
          height: 56px;
        }

        #root header .MuiToolbar-root {
          padding-left: 16px;
          padding-right: 16px;
        }

        #root header .MuiIconButton-root {
          padding: 8px;
        }

        #root header [data-header-right] .MuiAvatar-root,
        #root header [class*='RightContainer__StyledRightContainer'] .MuiAvatar-root {
          width: 32px;
          height: 32px;
        }
      }

      @media screen and (min-width: 657px) {
        #root [data-header-middle],
        #root [class*='MiddleContainer__StyledMiddleContainer'] {
          justify-content: center;
          margin-right: 2rem;
        }

        #root .header-search-form,
        #root [class*='SearchContainerWithTextField__StyledForm'] {
          flex-grow: 1;
          margin-left: 40px;
          margin-right: 4px;
          display: flex;
          max-width: 640px;
          border: 0.2px solid lightgray;
        }

        #root .header-search-input,
        #root [class*='SearchContainerWithTextField__SearchBox'] {
          border: none;
          padding: 1px 2px 1px 12px;
          height: 40px;
          width: 100%;
          font-size: 16px;
        }

        #root .header-search-icon-container,
        #root [class*='SearchContainerWithTextField__SearchIconContainer'] {
          width: 72px;
          height: 40px;
          display: grid;
          place-items: center;
          flex-grow: 1;
          border-left: 0.2px solid lightgray;
          background-color: #f8f8f8;
        }
      }

      #root img[alt='logo'] {
        width: 60px;
        height: 20px;
        display: block;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
